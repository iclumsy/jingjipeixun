<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证件处理</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="admin-page exam-bank-page document-tool-page">
    <div class="top-nav-bar">
        <a href="/admin" class="top-nav-link top-nav-outline">学员管理</a>
        <a href="/admin/files" class="top-nav-link top-nav-outline">文件管理</a>
        <a href="/admin/config" class="top-nav-link top-nav-outline">系统配置</a>
        <a href="/admin/exam-banks" class="top-nav-link top-nav-outline">题库管理</a>
        <a href="/auth/logout" class="top-nav-link top-nav-outline">退出</a>
    </div>

    <main class="document-tool-shell">
        <section class="document-tool-header">
            <div>
                <h1>证件处理</h1>
                <p>上传身份证或户口本图片，生成处理后的报名材料图片。</p>
            </div>
        </section>

        <section class="document-tool-panel">
            <form id="documentToolForm" class="document-tool-form">
                <div class="document-tool-type-group" role="radiogroup" aria-label="证件类型">
                    <button type="button" class="document-tool-type active" data-type="id_card">身份证</button>
                    <button type="button" class="document-tool-type" data-type="hukou">户口本</button>
                </div>

                <div id="uploadFields" class="document-tool-upload-grid"></div>

                <div class="document-tool-actions">
                    <button id="generateBtn" type="submit" class="document-tool-primary">生成图片</button>
                    <button id="resetBtn" type="button" class="document-tool-secondary">清空</button>
                </div>
            </form>
            <div id="toolMessage" class="exam-bank-message"></div>
        </section>

        <section id="previewPanel" class="document-tool-preview" hidden>
            <div class="document-tool-preview-column">
                <h2>原图</h2>
                <div id="inputList" class="document-tool-card-grid"></div>
            </div>
            <div class="document-tool-preview-column">
                <h2>生成结果</h2>
                <div id="outputList" class="document-tool-card-grid"></div>
                <div id="resultActions" class="document-tool-actions document-tool-result-actions" hidden>
                    <button id="openAdjustBtn" type="button" class="document-tool-primary">调整</button>
                    <a id="zipDownloadLink" class="document-tool-secondary" href="#" target="_blank" rel="noopener">打包下载</a>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/js/document_tools_admin.js"></script>
</body>
</html>
